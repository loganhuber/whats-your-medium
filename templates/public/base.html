<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="What's Your Medium">
    <meta property="og:description" content="I will make your dog out of clay!">
    <meta property="og:image" content="{{ url_for('static', filename='assets/img-break-2.JPG')}}">

    <!-- <meta name="twitter:card" content="summary_large_image"> -->
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}">
    <link href="https://api.fontshare.com/css?f[]=clash-display@400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>


<header>
    <nav class="navbar ranade navbar-expand-lg dark-bg" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index')}}">What's Your Medium</a>
           
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" aria-current="page" href="{{ url_for('index') }}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}" href="{{url_for('contact') }}">Contact</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle {% if request.endpoint == 'portfolio' %}active{% endif %}" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Portfolio
                    </a>
                    <ul class="dropdown-menu dark-bg">
                        {% for cat in categories %}
                        <li><a class="dropdown-item" href="{{ url_for('portfolio', category_id=cat.id) }}">{{ cat.category_name }}</a></li>
                        <!-- <li><hr class="dropdown-divider"></li> -->
                        <!-- maybe add this break? I'd have to remove the last one cuz it looks weird -->
                        {% endfor %}
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('index') }}#faq">FAQ</a>
                </li>
            </ul>
            <ul class="navbar-nav mb-1 mb-lg-0 me-5">
                <a target="_blank" href="https://www.instagram.com/whatsyour.medium/" class="fa fa-instagram nav-link " style="font-size: x-large;" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Instagram"></a>
            </ul>
            <a href="/" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Follow me on Instagram!">

                <img class="h-75" src="{{ url_for('static', filename='assets/dog-2.gif')}}" alt="Unecessary gif of a dog wagging its tail">
            </a>
        </div>
    </nav>
</header>
<body> 
    {% block body %}
    {% endblock %}      
</body>
<footer id="footer">
    <div class="container-fluid pt-5 h-100">

        <div class="row text-center">
            <h5 class="display-5 ranade">What's Your Medium</h5>
        </div>
        <div class="row text-center">
            <p class="text-center ">whatsyourdogchicago@gmail.com</p>
        </div>
        <div class="row text-center">
            <a class="nav-link" target="_blank" href="https://www.instagram.com/whatsyour.medium/">Instagram</a>
        </div>
        <div class="row mt-5">
            <img class="m-auto" style="max-width: 200px;" src="{{ url_for('static', filename='assets/dog-1.gif') }}" alt="Another dog gif">
        </div>
        
        
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='javascript/main.js') }}"></script>
</html>
