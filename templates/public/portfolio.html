{% extends 'public/base.html' %}

{% block body %}

<main>
    <h1>Hi mom. this is the portfolio page.</h1>
    <nav>
  <div class="nav nav-tabs" id="nav-tab" role="tablist">
    {% for cat in categories %}
    <button class="nav-link portfolio-btn" id="nav-home-tab" data-bs-toggle="tab" data-bs-target="#{{ cat.id }}" type="button" role="tab" aria-controls="nav-home" aria-selected="true">{{ cat.category_name }}</button>
    {% endfor %}
  </div>
</nav>
<div class="tab-content" id="nav-tabContent">
    {% for cat in categories %}
    <div class="tab-pane fade" id="{{ cat.id }}" role="tabpanel" aria-labelledby="nav-profile-tab">
      <div class="container">
        {% for img in images %}
            {% if img.category_id == cat.id %}
              <div class="portfolio-image-container">
                <img src="{{ url_for('static', filename='uploads/' + img.filename) }}" alt="{{ img.image_name }}" class="portfolio-image">
              </div>
            {% endif %}
        {% endfor %}

      </div>
    </div>
    {% endfor %}
</div>
</main>

{% endblock %}
