{% extends 'public/base.html' %}

{% block title %}Portfolio{% endblock %}

{% block body %}
<!-- Modal -->
<div class="modal fade" id="modal-center" tabindex="-1" data-bs-theme="dark" aria-labelledby="modalCenterTitle" >
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <!-- <h5 class="modal-title" id="modalCenterTitle">Modal title</h5> -->
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <img src="" alt="" class="" id="modal-image" style="width: 100%; height: auto;">
        <p id="modal-description" class="mt-3"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<main>

    <div class="container text-center mb-5">
      <h1 class="display-1">Portfolio</h1>
    </div>
    <nav>
      <div class="container">
          <ul class="row justify-content-center gx-1">
              {% for cat in categories %}
                <li class="col-2 list-unstyled text-center">
                  <a class="portfolio-btn btn btn-secondary" id="nav-{{ cat.id }}-tab" data-category-id="{{ cat.id }}"  data-bs-target="#cat-{{ cat.id }}" href="{{ url_for('portfolio', category_id=cat.id) }}">
                    
                      {{ cat.category_name }}
                        
                  </a>
                </li>
                {% endfor %}
          </ul>


    
      </div>
</nav>
<div class="portfolio-content">
    <!-- <div class="container">
      <div class="row-12 text-center">
        <h4>{{ selected_category.category_name }}</h4>
      </div>
    </div> -->

    <div class="bg-dark py-5" id="cat-{{ selected_category_id }}" aria-labelledby="nav-{{ selected_category_id }}-tab">
      <div class="container align-items-center">
        <div class="row masonry-container" data-category-id="{{ selected_category_id }}">

              {% include 'public/components/image-card.html' %}

        </div>
      </div>
      <div class="container text-center my-5">
          <button class="btn btn-light load-more-btn" data-category-id="{{ selected_category_id }}">Load More</button>

      </div>
      
    </div>

</div>
</main>
<script src="{{ url_for('static', filename='javascript/portfolio.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" integrity="sha384-GNFwBvfVxBkLMJpYMOABq3c+d3KnQxudP/mGPkzpZSTYykLBNsZEnG2D9G/X/+7D" crossorigin="anonymous" async></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>


{% endblock %}
