{% extends 'public/base.html' %}

{% block title %}Portfolio{% endblock %}

{% block body %}
<!-- Modal -->
<div class="modal fade" id="modal-center" tabindex="-1" aria-labelledby="modalCenterTitle" >
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <!-- <h5 class="modal-title" id="modalCenterTitle">Modal title</h5> -->
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <img src="" alt="" class="" id="modal-image" style="width: 100%; height: auto;">
        <p id="modal-description" class="mt-3"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<main>
    <!-- Button trigger modal -->
<!-- <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModalCenter">
  Launch demo modal
</button> -->



    <h1>Hi mom. this is the portfolio page.</h1>
    <nav>
  <div  role="tablist">
    {% for cat in categories %}

      <li  role="presentation">
        <a href="{{ url_for('portfolio', category_id=cat.id) }}">

          <button class="portfolio-btn" id="nav-{{ cat.id }}-tab" data-category-id="{{ cat.id }}" data-bs-toggle="tab" data-bs-target="#cat-{{ cat.id }}" type="button" aria-controls="cat-{{ cat.id }}" aria-selected="true">
              {{ cat.category_name }}
          </button>
        </a>
        </li>

    {% endfor %}
  </div>
</nav>
<div class="portfolio-content">

    <div class="" id="cat-{{ selected_category }}" aria-labelledby="nav-{{ selected_category }}-tab">
      <div class="container align-items-center">
        <div class="row masonry-container" data-category-id="{{ selected_category }}">

              {% include 'public/components/image-card.html' %}

        </div>
      </div>
      <button class="btn btn-primary load-more-btn" data-category-id="{{ selected_category }}">Load More</button>
    </div>

</div>
</main>
<script src="{{ url_for('static', filename='javascript/portfolio.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" integrity="sha384-GNFwBvfVxBkLMJpYMOABq3c+d3KnQxudP/mGPkzpZSTYykLBNsZEnG2D9G/X/+7D" crossorigin="anonymous" async></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>


{% endblock %}
