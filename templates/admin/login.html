<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>

  /* h1, p {
    text-align: center;
  }
  form {
    display: flex;
    flex-direction: column;
    align-items: center;
  } */
</style>
<body>
  <div class="container mt-5">

    <h2 class="text-center m-5">Login</h2>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <p class="alert alert-danger" role="alert">{{ message }}</p>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>
  
  <div class="container">
    
    <form class="text-center card"   action="{{ url_for('login') }}" method="POST" >
      <div class="row-5 m-3">
        <label class="col-1 form-label" for="username">Username</label>
        <input class="col-2" name="username" id="username" type="text" placeholder="johndoe">
      </div>
      <div class="row-5 m-3">
        <label class="col-1 form-label" for="password">Passowrd</label>
        <input class="col-2" type="password" name="password" placeholder="password">
      </div>
      <div class="row-3 m-3">
        <button class="btn btn-primary px-3" type="submit">Login</button>
      </div>
    </form>
  </div>

  <div class="container">

    <a class="btn btn-secondary mx-auto my-5" href="{{url_for('index') }}">Go back to site</a>
  </div>

</body>
</html>
